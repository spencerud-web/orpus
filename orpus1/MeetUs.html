<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Meet Us - Orpus</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
   <script src="headers.js"></script>
  <style>
  :root {
  --LinkedIn_Logo: "M20.447 20.452H17.21v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.984V9h3.102v1.561h.046c.432-.816 1.489-1.676 3.065-1.676 3.278 0 3.883 2.157 3.883 4.964v6.603zM5.337 7.433a1.8 1.8 0 1 1 0-3.601 1.8 1.8 0 0 1 0 3.601zm1.554 13.019H3.783V9h3.108v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
}
.linkedin-path {
  d: path(var(--LinkedIn_Logo));
  fill: #0077b5; /* Optional: Sets the official LinkedIn color */
}
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }


    .tablink:active { transform: translateY(0); }

    .team {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
      animation: fadeIn 1s ease 0.5s forwards;
      opacity: 0;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      width: 200px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border: 2px solid #05ABE8;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 0.5rem;
      border: 3px solid #05ABE8;
    }

    .card h3 {
      font-size: 1rem;
      margin: 0.5rem 0 0.25rem;
      color: #1a1a1a;
    }

    .card p {
      font-size: 0.85rem;
      color: #888;
      margin: 0 0 1rem;
    }

    .linkedin-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: white;
      padding: 0.4rem;
      border-radius: 3px;
      transition: background-color 0.2s ease;
      line-height: 0;
    }

    .linkedin-btn:hover { background-color: #0077cc; }

    .linkedin-btn svg {
      width: 40px;
      height: 40px;
      fill: white;
    }
  </style>
</head>
<body>

  <h3>Meet the Team</h3>

  <div class="team">

    <div class="card">
      <img src="cyrus.jpg" alt="Cyrus Barahmbegi" />
      <h3>Cyrus Barahmbegi</h3>
      <p>Co-Founder</p>
      <a class="linkedin-btn" href="https://www.linkedin.com/in/cyrus-barahmbegi" target="_blank">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path class="linkedin-path"/>
        </svg>
      </a>
    </div>

    <div class="card">
      <img src="sawyer.jpg" alt="Sawyer Michel" />
      <h3>Sawyer Michel</h3>
      <p>Co-Founder</p>
      <a class="linkedin-btn" href="https://www.linkedin.com/in/sawyer-michel" target="_blank">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path class="linkedin-path"/>
        </svg>
      </a>
    </div>

    <div class="card">
      <img src="spencer.jpg" alt="Spencer Rudolph" />
      <h3>Spencer Rudolph</h3>
      <p>Co-Founder</p>
      <a class="linkedin-btn" href="https://www.linkedin.com/in/spencer-rudolph" target="_blank">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path class="linkedin-path"/>
        </svg>
      </a>
    </div>

  </div>
</body>
</html>
